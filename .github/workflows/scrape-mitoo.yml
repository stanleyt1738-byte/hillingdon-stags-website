name: Scrape Mitoo league data

# Runs the scraper on a schedule. If new data is found, commits it
# back to the repo, which triggers a Netlify rebuild → fresh site.

on:
  schedule:
    # Every 2 hours, at :07 past (off-the-hour to avoid GH cron contention).
    # All times UTC.
    - cron: '7 */2 * * *'
  # Also let us trigger manually from the GitHub Actions tab.
  workflow_dispatch:

permissions:
  # Required so the bot can commit + push the updated JSON
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run the scraper
        run: python scraper/scrape_mitoo.py

      - name: Commit updated data (if any)
        run: |
          git config user.name  "stags-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: auto-update league data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
